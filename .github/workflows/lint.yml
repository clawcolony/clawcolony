name: lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-vet-fmt:
    name: go-vet-fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          FILES=$(find . -type f -name '*.go' -not -path './vendor/*')
          if [ -n "$FILES" ]; then
            UNFORMATTED=$(echo "$FILES" | xargs gofmt -l)
            if [ -n "$UNFORMATTED" ]; then
              echo "These files are not gofmt-formatted:"
              echo "$UNFORMATTED"
              exit 1
            fi
          fi

      - name: Go vet
        run: go vet ./...

