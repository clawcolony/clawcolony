name: cc-review-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  cc-review-gate:
    if: >
      github.event_name != 'issue_comment' ||
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR review contract and comments
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            function parseKVBlock(body, marker) {
              if (!body) return null;
              const lines = String(body).split(/\r?\n/);
              const start = lines.findIndex(l => l.trim() === marker);
              if (start < 0) return null;

              const out = {};
              for (let i = start + 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                if (line.startsWith('CC-') && line !== marker) break;
                const eq = line.indexOf('=');
                if (eq <= 0) continue;
                const k = line.slice(0, eq).trim();
                const v = line.slice(eq + 1).trim();
                out[k] = v;
              }
              return out;
            }

            function splitCSV(v) {
              if (!v) return [];
              return String(v).split(',').map(x => x.trim()).filter(Boolean);
            }

            function normalize(s) {
              return String(s || '').trim().toLowerCase();
            }

            const prNumber =
              context.eventName === 'pull_request'
                ? context.payload.pull_request.number
                : context.payload.issue.number;

            const pr = (await github.rest.pulls.get({
              owner, repo, pull_number: prNumber
            })).data;
            const headSha = pr.head.sha;

            const contract = parseKVBlock(pr.body || '', 'CC-REVIEW-CONTRACT-V1') || {};
            const proposerUserId = (contract.proposer_user_id || '').trim();
            const proposerUser = (contract.proposer_user || '').trim();
            const reviewerUserIds = splitCSV(contract.reviewer_user_ids);
            const reviewerUsers = splitCSV(contract.reviewer_users);
            const contractHeadSha = (contract.head_sha || '').trim();

            const failures = [];

            if (!proposerUserId) failures.push('contract missing proposer_user_id');
            if (!proposerUser) failures.push('contract missing proposer_user');
            if (!contractHeadSha) failures.push('contract missing head_sha');
            if (contractHeadSha && contractHeadSha !== headSha) {
              failures.push(`contract head_sha mismatch: contract=${contractHeadSha}, current=${headSha}`);
            }

            if (reviewerUserIds.length < 2) {
              failures.push('contract reviewer_user_ids must contain at least 2 ids');
            }
            if (reviewerUsers.length < 2) {
              failures.push('contract reviewer_users must contain at least 2 usernames');
            }
            if (reviewerUserIds.length !== reviewerUsers.length) {
              failures.push('contract reviewer_user_ids and reviewer_users length mismatch');
            }

            const expectedReviewers = [];
            if (reviewerUserIds.length === reviewerUsers.length) {
              for (let i = 0; i < reviewerUserIds.length; i++) {
                expectedReviewers.push({
                  user_id: reviewerUserIds[i],
                  reviewer: reviewerUsers[i]
                });
              }
            }

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100
            });
            const prReviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: prNumber, per_page: 100
            });

            const bodies = [
              ...issueComments.map(c => c.body || ''),
              ...prReviews.map(r => r.body || '')
            ];

            const reviewerPassMap = new Map();
            for (const b of bodies) {
              const blk = parseKVBlock(b, 'CC-REVIEW-V1');
              if (!blk) continue;

              const uid = (blk.reviewer_user_id || '').trim();
              const name = (blk.reviewer || '').trim();
              const sha = (blk.head_sha || '').trim();
              const decision = normalize(blk.decision);

              if (!uid || !name || !sha || !decision) continue;
              if (sha !== headSha) continue;
              if (decision !== 'pass') continue;

              reviewerPassMap.set(`${uid}::${normalize(name)}`, true);
            }

            for (const r of expectedReviewers) {
              const k = `${r.user_id}::${normalize(r.reviewer)}`;
              if (!reviewerPassMap.get(k)) {
                failures.push(`missing PASS CC-REVIEW-V1 for reviewer_user_id=${r.user_id}, reviewer=${r.reviewer}, head_sha=${headSha}`);
              }
            }

            let proposerCheckPass = false;
            for (const b of bodies) {
              const blk = parseKVBlock(b, 'CC-CHECK-V1');
              if (!blk) continue;

              const actorUserId = (blk.actor_user_id || '').trim();
              const actorUser = (blk.actor_user || '').trim();
              const sha = (blk.head_sha || '').trim();
              const result = normalize(blk.result);

              if (actorUserId !== proposerUserId) continue;
              if (normalize(actorUser) !== normalize(proposerUser)) continue;
              if (sha !== headSha) continue;
              if (result !== 'pass') continue;

              proposerCheckPass = true;
              break;
            }

            if (!proposerCheckPass) {
              failures.push(`missing PASS CC-CHECK-V1 for proposer_user_id=${proposerUserId}, proposer_user=${proposerUser}, head_sha=${headSha}`);
            }

            core.info(`PR #${prNumber}, head_sha=${headSha}`);
            core.info(`contract proposer_user_id=${proposerUserId}, proposer_user=${proposerUser}`);
            core.info(`contract reviewer_user_ids=${reviewerUserIds.join(',')}`);
            core.info(`contract reviewer_users=${reviewerUsers.join(',')}`);

            if (failures.length > 0) {
              core.setOutput('merge_allowed', 'false');
              core.setOutput('failures', JSON.stringify(failures));
              core.setFailed(`cc-review-gate failed:\n- ${failures.join('\n- ')}`);
            } else {
              core.setOutput('merge_allowed', 'true');
              core.info('cc-review-gate passed.');
            }
