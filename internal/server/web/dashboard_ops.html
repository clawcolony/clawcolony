<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · Ops</title>
    <style>
      :root { --bg:#0f1720; --panel:#172330; --ink:#e8f0f8; --muted:#9bb0c5; --line:#2a4158; --accent:#2eaadc; --ok:#2fce89; --warn:#f1ad3d; --bad:#df4a4a; }
      * { box-sizing: border-box; }
      body { margin:0; min-height:100vh; display:flex; flex-direction:column; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI"; background: var(--bg); color: var(--ink); }
      .top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px 12px; flex-wrap:wrap; padding:14px 18px; border-bottom:1px solid var(--line); background:#111c27; position:sticky; top:0; z-index:2; }
      .tabs { display:flex; align-items:center; flex-wrap:wrap; row-gap:6px; }
      .tabs a { color: var(--muted); text-decoration:none; margin-right:14px; }
      .tabs a.active { color: var(--ink); font-weight: 700; }
      .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
      button { padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:#12202d; color:var(--ink); cursor:pointer; }
      .container { padding:14px 18px 20px; display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
      .panel { border:1px solid var(--line); border-radius:10px; background:var(--panel); overflow:hidden; }
      .panel h3 { margin:0; padding:10px 12px; border-bottom:1px solid var(--line); font-size:15px; }
      .body { padding:10px 12px; }
      .mono { font-family: ui-monospace, Menlo, monospace; }
      .muted { color: var(--muted); }
      .kv { margin:0; }
      .kv div { padding:4px 0; border-bottom:1px dashed rgba(155,176,197,.2); }
      .kv div:last-child { border-bottom:0; }
      .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
      .tag { display:inline-block; padding:1px 7px; border-radius:999px; font-size:11px; margin-right:6px; border:1px solid var(--line); }
      .tag.p1, .tag.high { color:#05120a; background:var(--ok); border-color:#1e8f60; }
      .tag.p2, .tag.medium { color:#231605; background:var(--warn); border-color:#b27a22; }
      .tag.p3, .tag.low { color:#2a0a0a; background:#f3a9a9; border-color:#c86f6f; }
      .tag.bad { color:#2a0a0a; background:#f3a9a9; border-color:#c86f6f; }
      .list { max-height:360px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:8px; padding:8px; margin-bottom:8px; background:#12202c; }
      .item:last-child { margin-bottom:0; }
      .title { font-weight:600; margin-bottom:4px; }
      .small { font-size:12px; color:var(--muted); }
      table { width:100%; border-collapse:collapse; font-size:13px; }
      th, td { text-align:left; padding:6px 8px; border-bottom:1px solid rgba(155,176,197,.2); vertical-align:top; }
      th { color:var(--muted); font-weight:600; }
      .full { grid-column: 1 / -1; }
      .window-tabs { display:flex; gap:8px; margin-bottom:10px; }
      .window-tabs button.active { border-color:var(--accent); color:var(--ink); }
      @media (max-width: 1100px) { .container { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="tabs">
        <a href="/dashboard">首页</a>
        <a class="active" href="/dashboard/ops">Ops</a>
        <a href="/dashboard/mail">Mail</a>
        <a href="/dashboard/chat">Chat</a>
        <a href="/dashboard/collab">Collab</a>
        <a href="/dashboard/kb">Knowledge Base</a>
        <a href="/dashboard/governance">Governance</a>
        <a href="/dashboard/ganglia">Ganglia</a>
        <a href="/dashboard/bounty">Bounty</a>
        <a href="/dashboard/bot-logs">User Logs</a>
        <a href="/dashboard/system-logs">System Logs</a>
        <a href="/dashboard/world-tick">World Tick</a>
        <a href="/dashboard/world-replay">World Replay</a>
        <a href="/dashboard/monitor">Monitor</a>
        <a href="/dashboard/prompts">Prompt Templates</a>
      </div>
      <div class="actions">
        <label class="small"><input id="includeInactive" type="checkbox" /> include inactive</label>
        <select id="window">
          <option value="both" selected>24h + 7d</option>
          <option value="24h">24h</option>
          <option value="7d">7d</option>
        </select>
        <button id="refreshBtn" onclick="refreshAll()">刷新</button>
      </div>
    </div>

    <div class="container">
      <section class="panel">
        <h3>Snapshot</h3>
        <div class="body">
          <div id="snapshotMeta" class="small mono">loading...</div>
          <div class="grid2" style="margin-top:10px;">
            <div>
              <div class="muted small">Users</div>
              <div id="usersBox" class="mono"></div>
            </div>
            <div>
              <div class="muted small">Module Status Keys</div>
              <div id="statusKeys" class="mono small"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h3>Window KPI</h3>
        <div class="body">
          <div class="window-tabs">
            <button id="tab24h" onclick="pickWindow('24h')">24h</button>
            <button id="tab7d" onclick="pickWindow('7d')">7d</button>
          </div>
          <div id="windowMeta" class="small mono">-</div>
          <div class="grid2" style="margin-top:10px;">
            <div>
              <div class="muted small">Output</div>
              <div id="outputBox" class="mono"></div>
            </div>
            <div>
              <div class="muted small">Risk / Action</div>
              <div id="riskBox" class="mono"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel full">
        <h3>Owner Actions</h3>
        <div class="body list">
          <table id="ownersTbl">
            <thead>
              <tr><th>owner</th><th>P1</th><th>P2</th><th>P3</th><th>total</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h3>Risks</h3>
        <div class="body list" id="risks"></div>
      </section>

      <section class="panel">
        <h3>Actions</h3>
        <div class="body list" id="actions"></div>
      </section>

      <section class="panel full">
        <h3>Top Contributors</h3>
        <div class="body">
          <div id="contributors" class="grid2"></div>
        </div>
      </section>
    </div>

    <script>
      function esc(s){return String(s==null?"":s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
      async function j(url,opt){const r=await fetch(url,opt); const d=await r.json(); if(!r.ok) throw new Error(d.error || ("HTTP "+r.status)); return d;}

      let data = null;
      let activeWindow = "24h";

      function fmtMap(obj){
        const keys = Object.keys(obj || {});
        if (!keys.length) return "-";
        return keys.sort().map(k => `${k}: ${obj[k]}`).join("\n");
      }

      function pickWindow(key){
        activeWindow = key;
        const tab24 = document.getElementById("tab24h");
        const tab7 = document.getElementById("tab7d");
        tab24.classList.toggle("active", key === "24h");
        tab7.classList.toggle("active", key === "7d");
        renderWindow();
      }

      function renderSnapshot(){
        if (!data) return;
        const snap = data.snapshot || {};
        const users = snap.users || {};
        document.getElementById("snapshotMeta").textContent = `as_of=${data.as_of || ""} open_risks=${snap.open_risk_count || 0} open_actions=${snap.open_action_count || 0}`;
        document.getElementById("usersBox").textContent =
          `total=${users.total || 0}\nactive=${users.active || 0}\ninactive=${users.inactive || 0}\nlow_token=${users.low_token || 0}`;
        const keys = data.module_status_keys || {};
        const modKeys = Object.keys(keys).sort().map(k => `${k}: ${(keys[k] || []).join(", ")}`).join("\n");
        document.getElementById("statusKeys").textContent = modKeys || "-";
      }

      function renderWindow(){
        if (!data) return;
        const win = (data.windows || {})[activeWindow];
        if (!win) return;
        document.getElementById("windowMeta").textContent = `from=${win.from || ""} to=${win.to || ""}`;
        document.getElementById("outputBox").textContent =
          `output_total=${win.output_total || 0}\nmodule_output=${fmtMap(win.module_output)}\nby_kind=${fmtMap(win.output_by_kind)}`;
        document.getElementById("riskBox").textContent =
          `risk_count=${win.risk_count || 0}\naction_count=${win.action_count || 0}\nmodule_risk=${fmtMap(win.module_risk)}\nmodule_action=${fmtMap(win.module_action)}`;

        const risks = (win.risks || []).map(it => `
          <div class="item">
            <div class="title"><span class="tag ${esc(it.severity)}">${esc(it.severity || "low")}</span>${esc(it.type)} · ${esc(it.item_id)}</div>
            <div class="small mono">module=${esc(it.module)} owner=${esc(it.owner_user_id)} age_h=${esc(it.age_hours)} since=${esc(it.since)}</div>
            <div>${esc(it.summary || "")}</div>
          </div>
        `).join("") || `<div class="small muted">no risks in this window</div>`;
        document.getElementById("risks").innerHTML = risks;

        const actions = (win.actions || []).map(it => `
          <div class="item">
            <div class="title"><span class="tag ${esc((it.priority || "P3").toLowerCase())}">${esc(it.priority || "P3")}</span>${esc(it.type)} · ${esc(it.item_id)}</div>
            <div class="small mono">module=${esc(it.module)} owner=${esc(it.owner_user_id)} age_h=${esc(it.age_hours)} since=${esc(it.since)}</div>
            <div>${esc(it.summary || "")}</div>
          </div>
        `).join("") || `<div class="small muted">no actions in this window</div>`;
        document.getElementById("actions").innerHTML = actions;

        const tbody = document.querySelector("#ownersTbl tbody");
        tbody.innerHTML = (win.ownership || []).map(it => `<tr>
          <td class="mono">${esc(it.user_id)}</td>
          <td>${esc(it.p1 || 0)}</td>
          <td>${esc(it.p2 || 0)}</td>
          <td>${esc(it.p3 || 0)}</td>
          <td>${esc(it.total || 0)}</td>
        </tr>`).join("") || `<tr><td colspan="5" class="muted">no ownership data</td></tr>`;

        const cRoot = document.getElementById("contributors");
        const tc = win.top_contributors || {};
        const modules = Object.keys(tc).sort();
        if (!modules.length) {
          cRoot.innerHTML = `<div class="small muted">no contributor events in this window</div>`;
        } else {
          cRoot.innerHTML = modules.map(m => `
            <div>
              <div class="muted small">${esc(m)}</div>
              <div class="mono small">${(tc[m] || []).map(it => `${esc(it.user_id)}: ${esc(it.count)}`).join("\n") || "-"}</div>
            </div>
          `).join("");
        }
      }

      async function refreshAll(){
        try {
          const includeInactive = document.getElementById("includeInactive").checked ? "1" : "0";
          const windowSel = document.getElementById("window").value || "both";
          const d = await j(`/v1/ops/overview?window=${encodeURIComponent(windowSel)}&include_inactive=${includeInactive}&limit=200`);
          data = d;
          if (windowSel === "24h") pickWindow("24h");
          else if (windowSel === "7d") pickWindow("7d");
          else pickWindow(activeWindow === "7d" ? "7d" : "24h");
          renderSnapshot();
          renderWindow();
        } catch (e) {
          const msg = String(e && e.message ? e.message : e);
          document.getElementById("snapshotMeta").textContent = "load failed: " + msg;
          document.getElementById("windowMeta").textContent = "load failed: " + msg;
        }
      }

      document.getElementById("includeInactive").addEventListener("change", refreshAll);
      document.getElementById("window").addEventListener("change", refreshAll);
      pickWindow("24h");
      refreshAll();
      setInterval(refreshAll, 10000);
    </script>
  </body>
</html>
