<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · User Logs</title>
    <style>
      :root {
        --bg:#050d18;
        --bg-soft:#0b192d;
        --panel:#0f2238;
        --panel-hi:#15304e;
        --ink:#ecf6ff;
        --muted:#92aac3;
        --line:#28517a;
        --accent:#37d8ff;
        --accent-soft:#8ceeff;
        --ok:#41d89c;
        --warn:#ffbf5b;
        --bad:#ff6b78;
        --shadow:0 18px 48px rgba(2, 8, 16, .42);
      }
      * { box-sizing: border-box; }
      html, body { height:100%; min-height:100%; }
      body {
        margin:0;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        overflow-y:auto;
        overflow-x:auto;
        font-family:"Avenir Next", "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(1200px 680px at 8% -8%, rgba(55,216,255,.16), transparent 55%),
          radial-gradient(900px 600px at 100% 0%, rgba(28,154,245,.16), transparent 60%),
          linear-gradient(180deg, #081326 0%, #050d18 56%, #040912 100%);
        color:var(--ink);
      }
      body::before {
        content:"";
        position:fixed;
        inset:0;
        pointer-events:none;
        background-image:linear-gradient(rgba(90,170,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(90,170,255,.05) 1px, transparent 1px);
        background-size:40px 40px;
        opacity:.35;
        z-index:-1;
      }
      .top {
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:10px 12px;
        flex-wrap:wrap;
        padding:14px 18px;
        border-bottom:1px solid var(--line);
        background:linear-gradient(180deg, rgba(11,25,44,.95) 0%, rgba(7,18,32,.9) 100%);
        backdrop-filter: blur(8px);
        position:sticky;
        top:0;
        z-index:4;
        box-shadow:0 10px 24px rgba(0, 0, 0, .28);
      }
      .tabs { display:flex; align-items:center; flex-wrap:wrap; row-gap:8px; column-gap:8px; }
      .tabs a {
        color:var(--muted);
        text-decoration:none;
        padding:6px 11px;
        border:1px solid transparent;
        border-radius:999px;
        font-size:13px;
        letter-spacing:.02em;
        transition:all .15s ease;
      }
      .tabs a:hover {
        color:var(--ink);
        border-color:rgba(55,216,255,.45);
        background:rgba(55,216,255,.12);
      }
      .tabs a.active {
        color:#062234;
        font-weight:700;
        border-color:rgba(140,238,255,.9);
        background:linear-gradient(135deg, #8ceeff 0%, #37d8ff 100%);
        box-shadow:0 0 0 1px rgba(6,34,52,.25), 0 8px 22px rgba(55,216,255,.32);
      }
      input, select, button, textarea {
        border-radius:10px;
        border:1px solid rgba(67,121,168,.68);
        background:linear-gradient(180deg, rgba(16,37,60,.95) 0%, rgba(11,27,46,.95) 100%);
        color:var(--ink);
        box-shadow:inset 0 1px 0 rgba(171,227,255,.08);
      }
      input:focus, select:focus, button:focus, textarea:focus {
        outline:none;
        border-color:var(--accent);
        box-shadow:0 0 0 2px rgba(55,216,255,.2), inset 0 1px 0 rgba(171,227,255,.1);
      }
      button {
        border-color:rgba(89,148,196,.8);
        background:linear-gradient(180deg, rgba(26,77,118,.95) 0%, rgba(16,51,84,.95) 100%);
      }
      button:hover { filter:brightness(1.08); }
      .panel, .card, .law, .cost, .evo {
        border-color:rgba(62,115,162,.78) !important;
        background:linear-gradient(180deg, rgba(17,38,62,.93) 0%, rgba(12,28,47,.92) 100%) !important;
        box-shadow:var(--shadow);
      }
      .item, .bot, .agent, .msg, .event {
        border-color:rgba(67,123,173,.72) !important;
        background:linear-gradient(180deg, rgba(17,38,62,.82) 0%, rgba(12,28,47,.82) 100%) !important;
      }
      pre, .log {
        background:rgba(6,16,29,.72);
        border-color:rgba(67,123,173,.65);
      }
      .meta, .mono { color:var(--muted); }
      a { color:var(--accent-soft); }
      ::-webkit-scrollbar { width:10px; height:10px; }
      ::-webkit-scrollbar-thumb { background:#28507a; border-radius:999px; }
      ::-webkit-scrollbar-track { background:#081628; }

      .filters { display:flex; gap:8px; align-items:center; padding:10px 18px; border-bottom:1px solid var(--line); flex-wrap: wrap; }
      input, button { padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:#12202d; color:var(--ink); }
      button { background:#1f394d; cursor:pointer; }
      .grid { flex:1; min-height:0; display:grid; grid-template-columns: 320px 1fr; gap:12px; padding:12px 18px 18px; }
      .panel { border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--panel); min-height:0; display:flex; flex-direction:column; }
      .panel h3 { margin:0; padding:10px 12px; border-bottom:1px solid var(--line); font-size:15px; }
      .bots { overflow:auto; flex:1; min-height:0; padding:8px; }
      .bot { border:1px solid var(--line); border-radius:8px; padding:8px; margin-bottom:8px; cursor:pointer; }
      .bot.active { border-color: var(--accent); background:#123247; }
      .mono { font-family: ui-monospace, Menlo, monospace; }
      .log { overflow:auto; flex:1; min-height:0; padding:10px 10px 24px; white-space:pre-wrap; word-break:break-word; font-family: ui-monospace, Menlo, monospace; font-size:12px; line-height:1.45; }
      @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; height:auto; } .panel{height:55vh;} }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="tabs">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/ops">Ops</a>
        <a href="/dashboard/mail">Mail</a>
        <a href="/dashboard/chat">Chat</a>
        <a href="/dashboard/collab">Collab</a>
        <a href="/dashboard/kb">Knowledge Base</a>
        <a href="/dashboard/governance">Governance</a>
        <a href="/dashboard/ganglia">Ganglia</a>
        <a href="/dashboard/bounty">Bounty</a>
        <a class="active" href="/dashboard/bot-logs">User Logs</a>
        <a href="/dashboard/system-logs">System Logs</a>
        <a href="/dashboard/world-tick">World Tick</a>
        <a href="/dashboard/world-replay">World Replay</a>
        <a href="/dashboard/monitor">Monitor</a>
        <a href="/dashboard/prompts">Prompt Templates</a>
      </div>
      <button onclick="refreshAll(true)">刷新</button>
    </div>
    <div class="filters">
      <label>tail:
        <input id="tail" value="400" style="width:90px" />
      </label>
      <label>关键词:
        <input id="kw" placeholder="过滤日志行" style="width:220px" />
      </label>
      <label>
        <input id="showAll" type="checkbox" />
        显示历史 USER
      </label>
      <button onclick="downloadLog()">下载当前日志</button>
      <label class="mono" id="activeLabel">当前: 未选择</label>
    </div>
    <div class="grid">
      <section class="panel">
        <h3>All Users</h3>
        <div class="bots" id="bots"></div>
      </section>
      <section class="panel">
        <h3>Detailed Log</h3>
        <div class="log" id="log"></div>
      </section>
    </div>
    <script>
      function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;")}
      async function j(url){const r=await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json();}
      let bots = [];
      let selected = "";
      let includeInactive = false;
      let botRefreshTick = 0;
      function distinctNonEmpty(parts){
        const out = [];
        for (const part of (parts || [])) {
          const v = String(part || "").trim();
          if (!v) continue;
          if (out.includes(v)) continue;
          out.push(v);
        }
        return out;
      }
      function botDisplayLabel(bot){
        if (!bot) return "-";
        return distinctNonEmpty([bot.nickname, bot.name, bot.user_id]).join(" · ") || "-";
      }
      function botShortLabel(bot){
        if (!bot) return "-";
        return distinctNonEmpty([bot.nickname, bot.name, bot.user_id])[0] || bot.user_id || "-";
      }
      function selectedLabel(){
        const bot = bots.find(b => b.user_id === selected);
        return bot ? botDisplayLabel(bot) : (selected || "未选择");
      }
      async function loadBots(){
        const data = await j(`/v1/bots?include_inactive=${includeInactive ? "1" : "0"}`);
        bots = data.items || [];
        if (selected && !bots.some(b => b.user_id === selected)) {
          selected = "";
        }
        if (!selected && bots.length) selected = bots[0].user_id;
        renderBots();
      }
      function renderBots(){
        const root = document.getElementById("bots");
        root.innerHTML = bots.map(b => {
          const encodedID = encodeURIComponent(String(b.user_id || ""));
          return `
            <div class="bot ${selected===b.user_id?'active':''}" data-user-id="${encodedID}">
              <div><strong>${esc(botShortLabel(b))}</strong></div>
              <div class="mono">${esc(botDisplayLabel(b))}</div>
              <div style="color:#9bb0c5">${esc(b.status || "")}</div>
            </div>
          `;
        }).join("");
        for (const node of root.querySelectorAll(".bot[data-user-id]")) {
          node.addEventListener("click", () => {
            const encoded = node.getAttribute("data-user-id") || "";
            void pickByEncoded(encoded);
          });
        }
      }
      function pickByEncoded(encoded){
        return pick(decodeURIComponent(String(encoded || "")));
      }
      async function loadLog(){
        if (!selected) return;
        const tail = encodeURIComponent(document.getElementById("tail").value || "400");
        const data = await j(`/v1/bots/logs?user_id=${encodeURIComponent(selected)}&tail=${tail}`);
        document.getElementById("activeLabel").textContent = `当前: ${selectedLabel()} · pod=${data.pod || ""}`;
        const logNode = document.getElementById("log");
        const nearBottom = (logNode.scrollTop + logNode.clientHeight) >= (logNode.scrollHeight - 28);
        const raw = data.content || "";
        const kw = document.getElementById("kw").value.trim().toLowerCase();
        if (!kw) {
          logNode.textContent = raw;
          if (nearBottom) logNode.scrollTop = logNode.scrollHeight;
          return;
        }
        const lines = raw.split("\n").filter(line => line.toLowerCase().includes(kw));
        logNode.textContent = lines.join("\n");
        if (nearBottom) logNode.scrollTop = logNode.scrollHeight;
      }
      async function downloadLog(){
        if (!selected) return;
        const tail = encodeURIComponent(document.getElementById("tail").value || "400");
        const data = await j(`/v1/bots/logs?user_id=${encodeURIComponent(selected)}&tail=${tail}`);
        const blob = new Blob([data.content || ""], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const ts = new Date().toISOString().replaceAll(":","-");
        a.href = url;
        a.download = `${selected}-${ts}.log`;
        a.click();
        URL.revokeObjectURL(url);
      }
      async function pick(id){
        selected = id;
        renderBots();
        await loadLog();
      }
      async function refreshAll(forceBots){
        try {
          if (forceBots || (botRefreshTick % 4 === 0) || !selected) {
            await loadBots();
          }
          botRefreshTick += 1;
          await loadLog();
        } catch (e) {
          document.getElementById("log").textContent = "读取失败: " + (e.message || e);
        }
      }
      document.getElementById("showAll").addEventListener("change", async (e) => {
        includeInactive = !!e.target.checked;
        botRefreshTick = 0;
        await refreshAll(true);
      });
      setInterval(refreshAll, 3000);
      document.getElementById("kw").addEventListener("input", loadLog);
      refreshAll(true);
    </script>
  </body>
</html>
