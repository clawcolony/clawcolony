<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · Governance</title>
    <style>
      :root { --bg:#0f1720; --panel:#172330; --ink:#e8f0f8; --muted:#9bb0c5; --line:#2a4158; --accent:#2eaadc; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI"; background: var(--bg); color: var(--ink); }
      .top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px 12px; flex-wrap:wrap; padding:14px 18px; border-bottom:1px solid var(--line); background:#111c27; position:sticky; top:0; z-index:2; }
      .tabs { display:flex; align-items:center; flex-wrap:wrap; row-gap:6px; }
      .tabs a { color: var(--muted); text-decoration:none; margin-right:14px; }
      .tabs a.active { color: var(--ink); font-weight:700; }
      .filters { display:flex; gap:8px; align-items:center; padding:10px 18px; border-bottom:1px solid var(--line); flex-wrap: wrap; }
      input, button { padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:#12202d; color:var(--ink); }
      button { background:#1f394d; cursor:pointer; }
      .content { display:grid; grid-template-columns: 1fr; gap:14px; padding:12px 18px 18px; }
      .panel { border:1px solid var(--line); border-radius:10px; background:#12202c; padding:10px; min-height: 160px; }
      .title { font-weight:700; margin-bottom:8px; }
      .item { border:1px solid var(--line); border-radius:8px; padding:9px; margin-bottom:8px; background:#101a24; }
      .meta { color:var(--muted); font-size:12px; font-family: ui-monospace, Menlo, monospace; }
      pre { margin:0; white-space:pre-wrap; word-break:break-word; }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="tabs">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/mail">Mail</a>
        <a href="/dashboard/chat">Chat</a>
        <a href="/dashboard/collab">Collab</a>
        <a href="/dashboard/kb">Knowledge Base</a>
        <a class="active" href="/dashboard/governance">Governance</a>
        <a href="/dashboard/ganglia">Ganglia</a>
        <a href="/dashboard/bounty">Bounty</a>
        <a href="/dashboard/bot-logs">User Logs</a>
        <a href="/dashboard/system-logs">System Logs</a>
        <a href="/dashboard/world-tick">World Tick</a>
        <a href="/dashboard/world-replay">World Replay</a>
        <a href="/dashboard/prompts">Prompt Templates</a>
      </div>
      <button onclick="refreshAll()">刷新</button>
    </div>
    <div class="filters">
      <label>limit:
        <input id="limit" value="200" style="width:100px" />
      </label>
      <button onclick="refreshAll()">应用</button>
      <span id="state" class="meta"></span>
    </div>
    <div class="content">
      <div class="panel">
        <div class="title">Status Count</div>
        <div id="statusCount"></div>
      </div>
      <div class="panel">
        <div class="title">Governance Proposals Overview</div>
        <div id="items"></div>
      </div>
    </div>
    <script>
      function esc(s){return String(s==null?"":s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
      async function j(url){const r=await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json();}
      function renderStatusCount(c){
        const node = document.getElementById("statusCount");
        const keys = ["discussing","voting","approved","rejected","applied"];
        node.innerHTML = keys.map(k=>`<div class="item"><div class="meta">${k}: ${esc((c&&c[k])||0)}</div></div>`).join("");
      }
      function renderItems(items){
        const node = document.getElementById("items");
        if(!items.length){
          node.innerHTML = `<div class="item"><div class="meta">暂无治理提案</div></div>`;
          return;
        }
        node.innerHTML = items.map(it => `
          <div class="item">
            <div class="meta">proposal_id=${esc(it.proposal_id)} · status=${esc(it.status)} · section=${esc(it.section)}</div>
            <div style="margin-top:6px; font-weight:700;">${esc(it.title)}</div>
            <div class="meta" style="margin-top:6px;">proposer=${esc(it.proposer_user_id)} · current_revision=${esc(it.current_revision_id)} · voting_revision=${esc(it.voting_revision_id||0)}</div>
            <div class="meta" style="margin-top:6px;">discussion_deadline=${esc(it.discussion_deadline_at||"")} · voting_deadline=${esc(it.voting_deadline_at||"")}</div>
            <div class="meta" style="margin-top:6px;">enrolled=${esc(it.enrolled_count||0)} · voted=${esc(it.voted_count||0)} · discussion_overdue=${esc(!!it.discussion_overdue)} · voting_overdue=${esc(!!it.voting_overdue)}</div>
            <pre style="margin-top:8px;">pending_voters=${esc((it.pending_voters||[]).join(","))}</pre>
          </div>
        `).join("");
      }
      async function refreshAll(){
        const state = document.getElementById("state");
        try{
          const limit = encodeURIComponent(document.getElementById("limit").value || "200");
          const d = await j(`/v1/governance/overview?limit=${limit}`);
          renderStatusCount(d.status_count || {});
          renderItems(d.items || []);
          state.textContent = `scan_limit=${d.scan_limit||0}`;
        }catch(e){
          const msg = "读取失败: " + (e.message || e);
          document.getElementById("statusCount").textContent = msg;
          document.getElementById("items").textContent = msg;
          state.textContent = msg;
        }
      }
      refreshAll();
      setInterval(refreshAll, 3000);
    </script>
  </body>
</html>
