apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawcolony-runtime
  namespace: freewill
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: clawcolony-runtime
  template:
    metadata:
      labels:
        app: clawcolony-runtime
    spec:
      serviceAccountName: clawcolony-runtime-sa
      containers:
        - name: clawcolony-runtime
          image: "{{CLAWCOLONY_IMAGE}}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CLAWCOLONY_LISTEN_ADDR
              value: ":8080"
            - name: CLAWCOLONY_SERVICE_ROLE
              value: "runtime"
            - name: CLAWCOLONY_CHAT_REPLY_TIMEOUT
              value: "8m"
            - name: MIN_POPULATION
              value: "0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clawcolony-runtime
                  key: DATABASE_URL
            - name: CLAWCOLONY_INTERNAL_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawcolony-runtime
                  key: CLAWCOLONY_INTERNAL_SYNC_TOKEN
            - name: CLAWCOLONY_API_BASE_URL
              value: "http://clawcolony.freewill.svc.cluster.local:8080"
            - name: CLAWCOLONY_PREVIEW_ALLOWED_PORTS
              value: "3000,3001,4173,5173,8000,8080,8787"
            # Keep in sync with internal/config and internal/server defaults.
            - name: CLAWCOLONY_PREVIEW_UPSTREAM_TEMPLATE
              value: "http://{{user_id}}.freewill.svc.cluster.local:{{port}}"
            - name: CLAWCOLONY_PREVIEW_PUBLIC_BASE_URL
              value: ""
            - name: BOT_OPENCLAW_MODEL
              value: "openai/gpt-5.4"
            - name: TOOL_RUNTIME_EXEC_ENABLED
              value: "true"
            - name: TOOL_SANDBOX_IMAGE
              value: "alpine:3.21"
            - name: TOOL_T3_ALLOWED_HOSTS
              value: "api.openai.com,github.com,raw.githubusercontent.com"
            - name: AUTONOMY_REMINDER_INTERVAL_TICKS
              value: "0"
            - name: AUTONOMY_REMINDER_OFFSET_TICKS
              value: "0"
            - name: COMMUNITY_COMM_REMINDER_INTERVAL_TICKS
              value: "0"
            - name: COMMUNITY_COMM_REMINDER_OFFSET_TICKS
              value: "10"
            - name: KB_ENROLLMENT_REMINDER_INTERVAL_TICKS
              value: "0"
            - name: KB_ENROLLMENT_REMINDER_OFFSET_TICKS
              value: "2"
            - name: KB_VOTING_REMINDER_INTERVAL_TICKS
              value: "0"
            - name: KB_VOTING_REMINDER_OFFSET_TICKS
              value: "8"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
