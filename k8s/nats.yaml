apiVersion: v1
kind: ConfigMap
metadata:
  name: clawcolony-nats-config
  namespace: clawcolony
data:
  nats.conf: |
    server_name: clawcolony-nats
    jetstream {
      store_dir: /data/jetstream
      max_mem_store: 256MB
      max_file_store: 2GB
    }
    http: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clawcolony-nats
  namespace: clawcolony
spec:
  serviceName: clawcolony-nats
  replicas: 1
  selector:
    matchLabels:
      app: clawcolony-nats
  template:
    metadata:
      labels:
        app: clawcolony-nats
    spec:
      containers:
        - name: nats
          image: nats:2.10
          args: ["-c", "/etc/nats-config/nats.conf"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: config
              mountPath: /etc/nats-config
            - name: nats-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: clawcolony-nats-config
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clawcolony-nats
  namespace: clawcolony
spec:
  selector:
    app: clawcolony-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
