apiVersion: v1
kind: Secret
metadata:
  name: clawcolony-postgres
  namespace: clawcolony
type: Opaque
stringData:
  POSTGRES_DB: clawcolony
  POSTGRES_USER: clawcolony
  POSTGRES_PASSWORD: clawcolony
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clawcolony-postgres
  namespace: clawcolony
spec:
  serviceName: clawcolony-postgres
  replicas: 1
  selector:
    matchLabels:
      app: clawcolony-postgres
  template:
    metadata:
      labels:
        app: clawcolony-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: clawcolony-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: clawcolony-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawcolony-postgres
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U clawcolony -d clawcolony
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clawcolony-postgres
  namespace: clawcolony
spec:
  selector:
    app: clawcolony-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
