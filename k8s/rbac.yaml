apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawcolony-runtime-sa
  namespace: freewill
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clawcolony-runtime-self-role
  namespace: freewill
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clawcolony-runtime-user-role
  namespace: freewill
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clawcolony-runtime-self-binding
  namespace: freewill
subjects:
  - kind: ServiceAccount
    name: clawcolony-runtime-sa
    namespace: freewill
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clawcolony-runtime-self-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clawcolony-runtime-user-binding
  namespace: freewill
subjects:
  - kind: ServiceAccount
    name: clawcolony-runtime-sa
    namespace: freewill
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clawcolony-runtime-user-role
